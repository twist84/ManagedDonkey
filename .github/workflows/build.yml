name: build

on:
  push:

jobs:
  build-win:
    strategy:
      matrix:
        BUILD_CONFIGURATION: [ 0_Tags, 1_Debug, 2_Test, 3_Play, 4_Profile, 5_Release ]

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Get CMake
      uses: lukka/get-cmake@v4.2.0
      with:
        cmakeVersion: 4.2.0

    - name: Initialize Submodules 
      uses: snickerbockers/submodules-init@v4

    - name: Configure CMake
      run: cmake -B build -S . -A Win32

    - name: Build
      run: cmake --build build --config ${{ matrix.BUILD_CONFIGURATION }}

    - name: Zip Release
      run: |
        7z a ${{ matrix.BUILD_CONFIGURATION }}.7z ./bin/${{ matrix.BUILD_CONFIGURATION }}/*

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: builds-${{ matrix.BUILD_CONFIGURATION }}
        path: ${{ matrix.BUILD_CONFIGURATION }}.7z

  release:
    needs: build-win
    runs-on: ubuntu-latest
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: builds-*
        merge-multiple: true

    - name: Update Latest Release
      uses: softprops/action-gh-release@v1
      with:
        files: "*.7z"
        tag_name: latest
        name: Latest Build
        body: "Automated build from latest commit."
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
